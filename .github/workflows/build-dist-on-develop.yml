name: Build Installable ZIP

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: dist-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dist:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installable package
        run: npm run dist:build

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: mclucy-latest-${{ github.sha }}
          path: public/downloads/mclucy-latest.zip
          if-no-files-found: error
          retention-days: 14
